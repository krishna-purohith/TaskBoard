name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Type check
        run: pnpm turbo run check-types
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Lint
        run: pnpm turbo run lint

      - name: BUild Docker image
        run: |
          IMAGE="ghcr.io/krishna-purohith/taskboard-server"
          docker build -f apps/server/Dockerfile \
            --build-arg "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${{ github.sha }}" \
            .

      - name: Login to Github Container Registry
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | 
          docker login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Push Docker image
        run: |
          docker push ghcr.io/krishna-purohith/taskboard-server:latest
          docker push ghcr.io/krishna-purohith/taskboard-server:${{ github.sha }}

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker compose -f /root/docker-compose.prod.yml pull
            docker compose -f /root/docker-compose.prod.yml up -d
